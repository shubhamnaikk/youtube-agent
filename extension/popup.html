<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --primary: #FF0000;
      --primary-hover: #CC0000;
      --bg: #F8F9FA;
      --card-bg: #FFFFFF;
      --text: #202124;
      --text-muted: #5F6368;
      --border: #DADCE0;
      --radius: 12px;
    }

    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .header-icon {
      background: #ff000015;
      color: var(--primary);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 16px;
    }

    h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .status {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--card-bg);
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255, 0, 0, 0.1);
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(255, 0, 0, 0.2);
    }

    button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(255, 0, 0, 0.25);
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 0 2px 8px rgba(255, 0, 0, 0.2);
    }

    button:disabled {
      background: #E8EAED;
      color: #9AA0A6;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .loader-container {
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px 0;
      flex-direction: column;
      gap: 12px;
    }

    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    #result {
      font-size: 14px;
      line-height: 1.6;
      max-height: 350px;
      overflow-y: auto;
      border: 1px solid var(--border);
      padding: 16px;
      background: var(--card-bg);
      border-radius: var(--radius);
      display: none;
      color: #3C4043;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
    }

    /* Markdown Styling */
    #result h1,
    #result h2,
    #result h3 {
      font-weight: 600;
      color: #202124;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      line-height: 1.3;
    }

    #result h1 {
      font-size: 1.25em;
      margin-top: 0;
    }

    #result h2 {
      font-size: 1.1em;
    }

    #result h3 {
      font-size: 1em;
    }

    #result p {
      margin-top: 0;
      margin-bottom: 1em;
    }

    #result p:last-child {
      margin-bottom: 0;
    }

    #result ul,
    #result ol {
      margin-top: 0;
      margin-bottom: 1em;
      padding-left: 20px;
    }

    #result li {
      margin-bottom: 0.25em;
    }

    #result a {
      color: var(--primary);
      text-decoration: none;
    }

    #result a:hover {
      text-decoration: underline;
    }

    #result strong {
      font-weight: 600;
      color: #000;
    }

    #result code {
      background: #F1F3F4;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 12px;
      color: #e83e8c;
    }

    #result pre {
      background: #F1F3F4;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 1em;
    }

    #result pre code {
      background: transparent;
      padding: 0;
      color: inherit;
    }

    #result blockquote {
      border-left: 4px solid var(--border);
      margin: 0 0 1em 0;
      padding: 0.5em 0 0.5em 1em;
      color: var(--text-muted);
      background: #f8f9fa;
      border-radius: 0 8px 8px 0;
    }

    /* Custom Scrollbar */
    #result::-webkit-scrollbar {
      width: 6px;
    }

    #result::-webkit-scrollbar-track {
      background: transparent;
    }

    #result::-webkit-scrollbar-thumb {
      background: #DADCE0;
      border-radius: 10px;
    }

    #result::-webkit-scrollbar-thumb:hover {
      background: #BDC1C6;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">✨</div>
      <div>
        <h2>AI Video Notes</h2>
        <div id="status" class="status">Open a YouTube video</div>
      </div>
    </div>

    <textarea id="customPrompt"
      placeholder="What should the AI look for?&#10;e.g., 'Summarize the steps'&#10;e.g., 'List the ingredients'"></textarea>

    <button id="summarizeBtn">Generate AI Notes</button>

    <div id="loaderContainer" class="loader-container">
      <div class="loader"></div>
      <div id="progressText" class="status">AI is watching...</div>
    </div>

    <div id="result"></div>
  </div>
  <!-- Use marked library for rendering beautiful markdown -->
  <script src="marked.min.js"></script>
  <script src="popup.js"></script>
</body>

</html>
